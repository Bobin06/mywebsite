services:
  - type: web
    name: promptforge-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        value: ${SUPABASE_URL}
      - key: SUPABASE_KEY
        value: ${SUPABASE_KEY}
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}
      - key: PORT
        value: ${PORT}
